<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CurveGPU Library Example</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #f5f1e8;
        color: #1d232b;
      }
      body {
        margin: 0;
        padding: 32px;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        background: #fffaf0;
        border: 1px solid #d8cdb9;
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 18px;
        color: #4f5b66;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      button,
      a {
        font: inherit;
      }
      button {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #8b7355;
        background: #d8edcf;
        cursor: pointer;
      }
      #status {
        font-weight: 700;
        color: #6c5a3f;
      }
      body[data-status="pass"] #status { color: #1a7f37; }
      body[data-status="fail"] #status { color: #cf222e; }
      pre {
        margin: 18px 0 0;
        padding: 16px;
        border-radius: 12px;
        background: #1f2430;
        color: #e6edf3;
        overflow: auto;
        min-height: 240px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body data-status="idle">
    <main>
      <h1 id="heading">CurveGPU Library Example</h1>
      <p id="description">Small consumer-oriented example using the public CurveGPU browser API.</p>
      <div class="toolbar">
        <button id="run" type="button">Run</button>
        <span id="status">Idle</span>
      </div>
      <pre id="log"></pre>
    </main>
    <script type="module" src="/web/dist/library_example.js?v=1"></script>
  </body>
</html>
