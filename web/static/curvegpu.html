<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Curve WebGPU Suite</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        background: #f5f1e8;
        color: #1d232b;
      }
      body {
        margin: 0;
        padding: 32px;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        background: #fffaf0;
        border: 1px solid #d8cdb9;
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0 0 18px;
        color: #4f5b66;
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(4, max-content) 1fr;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }
      .suite-meta {
        margin-bottom: 12px;
        color: #5c4f3a;
        font-weight: 700;
      }
      label {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }
      select,
      input,
      button {
        font: inherit;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #8b7355;
        background: #fff;
      }
      button {
        background: #efe1c6;
        cursor: pointer;
      }
      #run {
        background: #d8edcf;
      }
      #status {
        font-weight: 700;
        color: #6c5a3f;
      }
      body[data-status="pass"] #status { color: #1a7f37; }
      body[data-status="fail"] #status { color: #cf222e; }
      pre {
        margin: 18px 0 0;
        padding: 16px;
        border-radius: 12px;
        background: #1f2430;
        color: #e6edf3;
        overflow: auto;
        min-height: 320px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body data-status="idle">
    <main>
      <h1 id="heading">Curve WebGPU Suite</h1>
      <p id="description">Single-page launcher for browser smoke and benchmark suites.</p>
      <div class="suite-meta">Mode: <span id="suite-kind">Smoke</span></div>
      <div class="toolbar">
        <label>curve <select id="curve-select"></select></label>
        <label>suite <select id="suite-select"></select></label>
        <button id="open-suite" type="button">Load Suite</button>
        <span></span>
      </div>
      <div id="bench-controls" class="toolbar" hidden>
        <label>min log2 <input id="min-log" type="number" value="10" min="1" max="24" /></label>
        <label>max log2 <input id="max-log" type="number" value="19" min="1" max="24" /></label>
        <label>iters <input id="iters" type="number" value="1" min="1" max="10" /></label>
        <span></span>
      </div>
      <div class="toolbar">
        <button id="run" type="button">Run</button>
        <span id="status">Idle</span>
      </div>
      <pre id="log"></pre>
    </main>
    <script type="module" src="/web/dist/curvegpu_page.js?v=1"></script>
  </body>
</html>
