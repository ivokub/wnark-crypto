<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebGPU Compute Sum</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --border: #334155;
    }

    body {
      margin: 0;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: radial-gradient(circle at top, #1e293b, var(--bg) 55%);
      color: var(--text);
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    button {
      border: 1px solid var(--border);
      background: #052e16;
      color: #dcfce7;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .status {
      color: var(--muted);
    }

    pre {
      margin: 0;
      padding: 16px;
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: auto;
      min-height: 320px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body data-status="idle">
  <main>
    <h1>WebGPU Compute Sum</h1>
    <p>
      This runs the same pairwise-sum compute shader in the browser. The shader is WGSL,
      not WASM. The wrapper below is plain browser JavaScript using WebGPU.
    </p>

    <div class="controls">
      <button id="run">Run Compute</button>
      <span id="status" class="status">Idle</span>
    </div>

    <pre id="log"></pre>
  </main>

  <script type="module">
    const NUM_ELEMENTS = 256;
    const OUT_COUNT = NUM_ELEMENTS / 2;
    const INPUT_BUF_SIZE = NUM_ELEMENTS * 4;
    const OUTPUT_BUF_SIZE = OUT_COUNT * 4;
    const UNIFORM_BUF_SIZE = 32;

    const shaderCode = `
@group(0) @binding(0) var<storage, read> input: array<u32, 256>;
@group(0) @binding(1) var<storage, read_write> output: array<u32, 128>;

struct Params {
  count: u32,
  _pad0: vec3<u32>,
}

@group(0) @binding(2) var<uniform> params: Params;

@compute @workgroup_size(64)
fn cs_main(@builtin(global_invocation_id) id: vec3<u32>) {
  let i = id.x;
  if (i >= params.count) {
    return;
  }
  let a = input[2u * i];
  let b = input[2u * i + 1u];
  output[i] = a + b;
}
`;

    const runButton = document.getElementById("run");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function writeLog(lines) {
      logEl.textContent = lines.join("\n");
    }

    async function runExample() {
      const lines = ["=== Browser WebGPU Compute Sum ===", ""];

      if (!("gpu" in navigator)) {
        throw new Error("WebGPU is not available in this browser.");
      }

      lines.push("1. Requesting adapter...");
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        throw new Error("Failed to acquire a WebGPU adapter.");
      }
      lines[lines.length - 1] += " OK";

      lines.push("2. Requesting device...");
      const device = await adapter.requestDevice();
      lines[lines.length - 1] += " OK";

      const inputValues = new Uint32Array(NUM_ELEMENTS);
      let cpuSum = 0;
      for (let i = 0; i < NUM_ELEMENTS; i += 1) {
        inputValues[i] = i + 1;
        cpuSum += i + 1;
      }
      lines.push(`3. Input: ${NUM_ELEMENTS} elements, CPU sum = ${cpuSum}`);

      lines.push("4. Creating buffers...");
      const inputBuffer = device.createBuffer({
        label: "input",
        size: INPUT_BUF_SIZE,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
      });
      const outputBuffer = device.createBuffer({
        label: "output",
        size: OUTPUT_BUF_SIZE,
        usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
      });
      const readbackBuffer = device.createBuffer({
        label: "readback",
        size: OUTPUT_BUF_SIZE,
        usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
      });
      const uniformBuffer = device.createBuffer({
        label: "params",
        size: UNIFORM_BUF_SIZE,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      lines[lines.length - 1] += " OK";

      device.queue.writeBuffer(inputBuffer, 0, inputValues);
      const uniformData = new Uint32Array(UNIFORM_BUF_SIZE / 4);
      uniformData[0] = OUT_COUNT;
      device.queue.writeBuffer(uniformBuffer, 0, uniformData);

      lines.push("5. Creating compute pipeline...");
      const shaderModule = device.createShaderModule({
        label: "sum-shader",
        code: shaderCode,
      });

      const bindGroupLayout = device.createBindGroupLayout({
        label: "sum-bgl",
        entries: [
          { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: "read-only-storage" } },
          { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: "storage" } },
          { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: "uniform" } },
        ],
      });

      const pipelineLayout = device.createPipelineLayout({
        label: "sum-pl",
        bindGroupLayouts: [bindGroupLayout],
      });

      const pipeline = device.createComputePipeline({
        label: "sum-pipeline",
        layout: pipelineLayout,
        compute: {
          module: shaderModule,
          entryPoint: "cs_main",
        },
      });

      const bindGroup = device.createBindGroup({
        label: "sum-bg",
        layout: bindGroupLayout,
        entries: [
          { binding: 0, resource: { buffer: inputBuffer, size: INPUT_BUF_SIZE } },
          { binding: 1, resource: { buffer: outputBuffer, size: OUTPUT_BUF_SIZE } },
          { binding: 2, resource: { buffer: uniformBuffer, size: UNIFORM_BUF_SIZE } },
        ],
      });
      lines[lines.length - 1] += " OK";

      lines.push("6. Dispatching compute...");
      const encoder = device.createCommandEncoder({ label: "sum-encoder" });
      const pass = encoder.beginComputePass();
      pass.setPipeline(pipeline);
      pass.setBindGroup(0, bindGroup);
      pass.dispatchWorkgroups(Math.ceil(OUT_COUNT / 64), 1, 1);
      pass.end();
      encoder.copyBufferToBuffer(outputBuffer, 0, readbackBuffer, 0, OUTPUT_BUF_SIZE);
      device.queue.submit([encoder.finish()]);
      lines[lines.length - 1] += " OK";

      lines.push("7. Reading results...");
      await readbackBuffer.mapAsync(GPUMapMode.READ);
      const mapped = readbackBuffer.getMappedRange();
      const results = new Uint32Array(mapped.slice(0));
      readbackBuffer.unmap();

      let gpuSum = 0;
      for (const value of results) {
        gpuSum += value;
      }
      lines[lines.length - 1] += " OK";

      lines.push("");
      lines.push(`CPU reference sum: ${cpuSum}`);
      lines.push(`GPU partial sum:   ${gpuSum}`);
      if (gpuSum !== cpuSum) {
        lines.push(`FAIL: mismatch (diff = ${cpuSum - gpuSum})`);
        writeLog(lines);
        throw new Error(`sum mismatch: GPU=${gpuSum}, CPU=${cpuSum}`);
      }
      lines.push("PASS: GPU sum matches CPU reference");
      writeLog(lines);
    }

    async function triggerRun() {
      runButton.disabled = true;
      setStatus("Running");
      document.body.dataset.status = "running";
      writeLog(["Starting..."]);
      try {
        await runExample();
        setStatus("Done");
        document.body.dataset.status = "pass";
      } catch (error) {
        setStatus("Failed");
        document.body.dataset.status = "fail";
        const message = error instanceof Error ? error.message : String(error);
        logEl.textContent += `\n\nERROR: ${message}`;
        console.error(error);
      } finally {
        runButton.disabled = false;
      }
    }

    runButton.addEventListener("click", triggerRun);

    if (new URLSearchParams(window.location.search).get("autorun") === "1") {
      queueMicrotask(triggerRun);
    }
  </script>
</body>
</html>
